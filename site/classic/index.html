<!doctype html>
<html lang="ru" data-mode="night">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T&T Studio — каталог</title>
  <meta name="description" content="T&T Studio — товары с историей и услуги под ключ: Telegram-боты, AI-ассистенты, автоматизация и веб-платформы.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='84'>∞</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,600;0,700;0,800;0,900;1,800&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="glyphfield" aria-hidden="true"></canvas>

  <div class="wrap">
    <header class="site-head">
      <button class="cart" id="cartBtn" aria-label="Корзина">
        🛒<span class="cart-count" id="cartCount" hidden>0</span>
      </button>
      <div class="logo" aria-label="T&T Studio">
        <span>T</span><span class="inf">∞</span><span>T</span>
        <span class="logo-word">STUDIO</span>
      </div>
    </header>

    <div class="switch" role="tablist" aria-label="Товары или услуги">
      <button class="switch-half" id="halfGoods" role="tab" aria-selected="false">
        <span class="kj">昼</span> ТОВАРЫ
      </button>
      <button class="switch-half" id="halfServices" role="tab" aria-selected="true">
        <span class="kj">夜</span> УСЛУГИ
      </button>
    </div>

    <main class="stage">
      <div class="stage-head">
        <p class="eyebrow"><span class="kj" id="eyebrowKj">道</span>
          <span class="tag" id="eyebrowTag">РАЗРАБОТКА</span></p>
        <h1 id="stageTitle">Технологии,<br>что работают<br>на бизнес</h1>
        <p class="lead" id="stageLead">Telegram-боты, AI-ассистенты, автоматизация и веб-платформы под ключ.</p>
      </div>

      <div class="cards" id="cards"></div>
    </main>

    <footer class="site-foot">
      <div class="logo small"><span>T</span><span class="inf">∞</span><span>T</span><span class="logo-word">STUDIO</span></div>
      <nav class="foot-links">
        <a id="footChannel" href="#" target="_blank" rel="noopener">Telegram-канал</a>
        <a id="footManager" href="#" target="_blank" rel="noopener">Написать нам</a>
      </nav>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
